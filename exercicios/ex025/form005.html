<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        fieldset {
            border: 3px dashed rgb(255, 0, 0);
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.288);
            background-color: rgb(235, 196, 196);
            width: 300px;
            margin-bottom: 10px;
        }

        legend {
            color: rgb(0, 0, 0);
            font-weight: bold;
        }

        label {
            font-weight: bold;
        }

        input.send {
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.288);
            background-color: rgb(235, 196, 196);
        }

        input.send:hover {
            background-color: rgb(235, 149, 149);
        }
    </style>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="isexmas" value="M"> <label for="isexmas"> Masculino</label> <br>
            <input type="radio" name="sexo" id="isxfem" checked value="F"><label for="isxfem"> Femenino</label>
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esbas" id="iesbas"> <label for="iesbas">Basquete</label> <br>
            <input type="checkbox" name="esfut" id="iesfut" checked> <label for="iesfut"> Futebol</label> <br>
            <input type="checkbox" name="esnat" id="iesnat"> <label for="iesnat">Natação</label> <br>
            <input type="checkbox" name="esten" id="iesten"> <label for="iesten">Tênis</label> <br>
        </fieldset>
        
        <p>
            <input class="send" type="submit" value="Enviar">
            <input class="send" type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>

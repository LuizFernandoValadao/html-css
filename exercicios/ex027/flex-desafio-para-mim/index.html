<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de flex</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        main {
            height: 100px;
            width: 100vw;
            background-color: skyblue;

            display: flex;
            flex-flow: row nowrap;
            align-items: stretch;
            justify-content: space-evenly;
            border: 5px solid black;
            border-radius: 20px
            
        }

        div {
            background-color: yellow;
            flex-basis: 100px;
            border-radius: 20px;
            margin: 10px;
            border: 3px solid white;
        }
        
        div#cx1 {
            flex-grow: 2;
        }

        div#cx2 {
           flex-grow: 1;
        }

        div#cx3 {
            flex-grow: 2;
        }
    </style>
</head>
<body>
    <main>
        <div id="cx1"></div>
        <div id="cx2"></div>
        <div id="cx3"></div>
    </main>
</body>
</html>

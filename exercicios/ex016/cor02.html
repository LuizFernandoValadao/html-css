<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        *{ /* Configurações globais das CSS */
            height: 100%
        }
        body {
            background-image: linear-gradient( #FFC300, #FF282F, #FF0063, #E803DF, #8A0BFA);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1 style="color: white; font-family: Arial, Helvetica, sans-serif;">Testando Gradientes</h1>
</body>
</html>
